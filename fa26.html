<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEMESTER_NAME — Course Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* CSS unchanged from your version */
</style>
</head>
<body>
<header class="site-header">
  <span class="wordmark">CCSF Mathematics Department</span>
</header>

<div class="hero">
  <div class="hero-text">
    <h1>SEMESTER_NAME</h1>
    <p>Updated 4/28/2026, 07:28 PM UTC</p>
  </div>
</div>

<div class="filter-bar">
  <div class="filter-group"><label>Course</label><select id="filterCourse"></select></div>
  <div class="filter-group"><label>Instructor</label><select id="filterInstructor"></select></div>
  <div class="filter-group"><label>Part of Term</label><select id="filterTerm"></select></div>
  <div class="filter-group"><label>Campus</label><select id="filterCampus"></select></div>
  <div class="filter-group"><label>Materials Cost</label><select id="filterMaterials"></select></div>
  <div class="filter-actions"><button class="btn-ghost" onclick="resetFilters()">Reset</button></div>
</div>

<main id="mainContent"></main>

<script>
let DATA = [];

function resetFilters(){
  ['filterCourse','filterInstructor','filterTerm','filterCampus','filterMaterials']
    .forEach(id => document.getElementById(id).value='');
  render();
}

function render(){
  const SC = new Set(DATA.map(d=>d.course).filter(c=>/\d+S$/.test(c)));
  const SM = {};
  DATA.filter(d=>SC.has(d.course)).forEach(d=>{
    const sn=d.section.match(/\(([^)]+)\)/)?.[1]||d.section;
    SM[d.course]=SM[d.course]||{};
    SM[d.course][sn]=d;
  });

  const main=document.getElementById('mainContent');
  main.innerHTML = DATA.filter(d=>!SC.has(d.course)).map(s=>{
    const secNum=s.section.match(/\(([^)]+)\)/)?.[1]||s.section;
    let linkedHtml='';

    for(const c of SC){
      if(SM[c] && SM[c][secNum]){
        const sup=SM[c][secNum];
        const supRoom=(sup.room||'').split(';')[0]
          .replace('General Assignment Room','')
          .replace('No Room Assigned','')
          .trim();

        linkedHtml = `
        <div class="linked-support">
          <div class="linked-support-label">${c} — Corequisite Support</div>
          <div class="linked-support-row">
            <span class="linked-crn-val">CRN ${sup.crn}</span>
            <span class="linked-meeting">${sup.meetingPattern}</span>
            <span class="linked-units">${sup.credits} units</span>
            ${supRoom ? `<span class="linked-units">${supRoom}</span>` : ''}
          </div>
          ${(sup.sectionNotes||'') ? `<div class="section-notes">${sup.sectionNotes}</div>` : ''}
        </div>`;
      }
    }

    return `
    <div class="section-card">
      <div class="meeting-time">${s.meetingPattern}</div>
      ${linkedHtml}
    </div>`;
  }).join('');
}
</script>
</body>
</html>
